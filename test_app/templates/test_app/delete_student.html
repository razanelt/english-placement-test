{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Student</title>
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'test_app/images/favicon.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body {
            min-height:100vh;
            background:linear-gradient(135deg,#050505,#101010 45%,#0a0a0a);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }
        .box {
            width:100%;
            max-width:600px;
            background:rgba(255,255,255,0.03);
            border:1px solid rgba(244,180,0,0.18);
            border-radius:24px;
            padding:28px;
            text-align:center;
        }
        h1 { margin-bottom:16px; color:#f4b400; }
        p { color:#d6d6d6; line-height:1.8; }
        .btn-row {
            display:flex;
            justify-content:center;
            gap:12px;
            flex-wrap:wrap;
            margin-top:20px;
        }
        button, a {
            text-decoration:none;
            border:none;
            padding:14px 18px;
            border-radius:14px;
            font-weight:800;
            cursor:pointer;
        }
        button {
            background:#c62828;
            color:white;
        }
        a {
            background:rgba(255,255,255,0.06);
            color:white;
            border:1px solid rgba(255,255,255,0.08);
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Delete Student</h1>
        <p>
            Are you sure you want to delete this student?<br>
            <strong>{{ student.full_name }}</strong> — {{ student.student_id }}
        </p>

        <form method="post">
            {% csrf_token %}
            <div class="btn-row">
                <button type="submit">Yes, Delete</button>
                <a href="{% url 'admin_dashboard' %}">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
